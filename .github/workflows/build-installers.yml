name: Build Installers

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  windows-installer:
    name: Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt pyinstaller

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Windows executable
        run: python build.py --onefile

      - name: Build Windows installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path $iscc)) {
            throw "ISCC.exe not found after install"
          }
          & $iscc installer.iss

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: VibeDnD-Setup-Windows
          path: dist/installer/VibeDnD-Setup-Windows.exe
          if-no-files-found: error

  macos-installer:
    name: macOS Installer
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt pyinstaller

      - name: Build macOS DMG
        run: python build_macos.py

      - name: Upload macOS installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: VibeDnD-Installer-macOS
          path: dist/installer-mac/VibeDnD-Installer-macOS.dmg
          if-no-files-found: error

  ubuntu-installer:
    name: Ubuntu Installer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev python3-tk

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt pyinstaller

      - name: Build Ubuntu DEB
        run: python build_ubuntu.py

      - name: Upload Ubuntu installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: VibeDnD-Installer-Ubuntu
          path: dist/installer-linux/*.deb
          if-no-files-found: error
